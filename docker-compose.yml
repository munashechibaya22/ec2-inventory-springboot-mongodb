version: '3.8'

services:
  app:
    image: ${ECR_IMAGE_URI:-munashechibaya/inventory-app:latest}
    container_name: inventory-app
    restart: always
    depends_on:
      - mongodb
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/inventory
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-that-is-at-least-256-bits-long-for-jwt-signing}
      - SERVER_PORT=8086
    expose:
      - "8086"

  mongodb:
    image: mongo:6.0
    container_name: inventory-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  nginx:
    image: nginx:alpine
    container_name: inventory-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  mongo-data:
